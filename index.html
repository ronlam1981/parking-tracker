<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="泊車記錄">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>泊車記錄</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --pri:#2563eb;--pri-d:#1d4ed8;--bg:#f1f5f9;--card:#fff;
            --txt:#1e293b;--txt2:#64748b;--danger:#ef4444;--ok:#22c55e;
            --warn:#f59e0b;--border:#e2e8f0;--r:12px;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,0)}

        /* ===== Header ===== */
        .hdr{background:var(--pri);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
        .hdr h1{font-size:18px}
        .hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer}

        /* ===== Pages (SPA) ===== */
        .page{display:none;padding:16px;padding-bottom:90px}
        .page.active{display:block}

        /* ===== Bottom Nav ===== */
        .bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
        .bnav-btn{flex:1;padding:10px 0 8px;text-align:center;border:none;background:none;cursor:pointer;color:var(--txt2);font-size:10px;transition:.2s}
        .bnav-btn .ico{font-size:22px;display:block;margin-bottom:2px}
        .bnav-btn.act{color:var(--pri)}

        /* ===== Cards ===== */
        .card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}

        /* ===== Vehicle Cards on Home ===== */
        .v-status{border-left:4px solid var(--pri);position:relative}
        .v-status.moto{border-left-color:var(--warn)}
        .v-status .v-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
        .v-status .v-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
        .v-status .v-avatar-placeholder{width:48px;height:48px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:24px}
        .v-status .v-info{flex:1}
        .v-status .v-name{font-size:15px;font-weight:700}
        .v-status .v-plate{font-size:12px;color:var(--txt2)}
        .v-status .v-parking{margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px}
        .v-status .v-parking-type{font-size:13px;font-weight:600;margin-bottom:4px}
        .v-status .v-parking-time{font-size:12px;color:var(--txt2)}
        .v-status .v-parking-loc{font-size:12px;color:var(--txt2);margin-top:2px}
        .v-status .v-parking-photo{width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:8px}
        .v-actions{display:flex;gap:8px;margin-top:10px}
        .v-actions button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
        .btn-park{background:var(--pri);color:#fff}
        .btn-find{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0!important}
        .btn-clear{background:#fef2f2;color:var(--danger);border:1px solid #fecaca!important}
        .btn-paid{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0!important}

        /* ===== Meter countdown ===== */
        .meter-bar{margin-top:8px}
        .meter-bar .bar-bg{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
        .meter-bar .bar-fill{height:100%;border-radius:3px;transition:width .5s}
        .meter-bar .bar-fill.ok{background:var(--ok)}
        .meter-bar .bar-fill.warn{background:var(--warn)}
        .meter-bar .bar-fill.danger{background:var(--danger)}
        .meter-countdown{font-size:20px;font-weight:700;text-align:center;margin:6px 0;font-variant-numeric:tabular-nums}
        .meter-label{font-size:12px;color:var(--txt2);text-align:center}

        /* ===== Parking Flow ===== */
        .flow-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .flow-back{background:none;border:none;font-size:20px;cursor:pointer;padding:4px}

        .p-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .p-type-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:20px 16px;text-align:center;cursor:pointer;transition:.2s}
        .p-type-card:active{transform:scale(.97)}
        .p-type-card.sel{border-color:var(--pri);background:#eff6ff}
        .p-type-card .ico{font-size:32px;margin-bottom:6px}
        .p-type-card .lbl{font-size:13px;font-weight:600}
        .p-type-card .sub{font-size:11px;color:var(--txt2);margin-top:2px}

        /* ===== Meter duration ===== */
        .dur-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
        .dur-btn{flex:1;min-width:70px;padding:14px 8px;border:2px solid var(--border);border-radius:10px;background:var(--card);text-align:center;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
        .dur-btn.sel{border-color:var(--warn);background:#fefce8;color:#a16207}
        .dur-btn .big{font-size:22px;font-weight:700;display:block}

        /* ===== Form ===== */
        .fg{margin-bottom:14px}
        .fg label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:5px}
        .fg input,.fg textarea,.fg select{width:100%;padding:11px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--card);color:var(--txt)}
        .fg textarea{resize:vertical;min-height:70px}

        /* ===== Photo ===== */
        .photo-box{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;min-height:100px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;margin-bottom:14px;position:relative;overflow:hidden}
        .photo-box.has{padding:0;border-style:solid}
        .photo-box img{width:100%;height:auto;border-radius:10px;display:block}
        .photo-box .ph-ico{font-size:32px;opacity:.35}
        .photo-box .ph-txt{font-size:12px;color:var(--txt2)}

        /* ===== Buttons ===== */
        .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s}
        .btn-pri{background:var(--pri);color:#fff}
        .btn-pri:active{background:var(--pri-d)}
        .btn-out{background:var(--card);color:var(--pri);border:2px solid var(--pri)}
        .btn-dn{background:var(--danger);color:#fff}
        .btn-sm{padding:8px 16px;font-size:13px;width:auto}
        .btn-g{background:var(--ok);color:#fff}

        /* ===== Location ===== */
        .loc-box{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px}
        .loc-box .st{font-size:12px;color:var(--txt2)}
        .loc-box .co{font-size:13px;font-weight:500;margin-top:2px}
        .loc-box a{color:var(--pri);font-size:12px;text-decoration:none}

        /* ===== Vehicle Manage ===== */
        .vm-card{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .vm-card .av{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border);cursor:pointer}
        .vm-card .av-ph{width:56px;height:56px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
        .vm-card .vm-info{flex:1}
        .vm-card .vm-name{font-size:15px;font-weight:700}
        .vm-card .vm-type{font-size:12px;color:var(--txt2)}
        .vm-card .vm-plate{font-size:12px;color:var(--txt2)}
        .vm-edit{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--txt2)}

        /* ===== History ===== */
        .filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
        .fchip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:12px;white-space:nowrap;cursor:pointer}
        .fchip.act{background:var(--pri);color:#fff;border-color:var(--pri)}

        .rec-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--pri)}
        .rec-card.moto{border-left-color:var(--warn)}
        .rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .vtag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
        .vtag.car{background:#dbeafe;color:var(--pri)}
        .vtag.moto{background:#fef3c7;color:#b45309}
        .ptag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-left:6px}
        .ptag.own{background:#f0fdf4;color:#16a34a}
        .ptag.free{background:#eff6ff;color:#2563eb}
        .ptag.meter{background:#fefce8;color:#a16207}
        .ptag.lot{background:#faf5ff;color:#7c3aed}
        .rec-time{font-size:11px;color:var(--txt2)}
        .rec-photo{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-bottom:8px}
        .rec-loc{font-size:13px;margin-bottom:6px}
        .rec-notes{font-size:12px;color:var(--txt2);padding:8px;background:#f8fafc;border-radius:6px;margin-bottom:6px}
        .rec-acts{display:flex;gap:6px;margin-top:8px}
        .rec-acts button{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:11px;cursor:pointer;color:var(--txt2)}
        .rec-acts .del{color:var(--danger);border-color:#fecaca}

        /* ===== Toast ===== */
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
        .toast.show{opacity:1}

        /* ===== Modal ===== */
        .modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
        .modal-bg.show{display:flex}
        .modal{background:var(--card);border-radius:16px;padding:22px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto}
        .modal h2{font-size:17px;margin-bottom:14px}
        .modal-acts{display:flex;gap:8px;margin-top:14px}
        .modal-acts .btn{flex:1}

        /* ===== Reminder Cards ===== */
        .rem-card{padding:14px;border-radius:var(--r);margin-bottom:10px;border:1px solid #fde68a;background:#fffbeb}
        .rem-card.overdue{background:#fef2f2;border-color:#fecaca}
        .rem-card h4{font-size:14px;margin-bottom:4px}
        .rem-card p{font-size:12px;color:var(--txt2)}
        .rem-card .rem-time{font-size:13px;font-weight:600;color:var(--warn);margin-top:4px}
        .rem-card.overdue .rem-time{color:var(--danger)}

        /* ===== Paid Exit Countdown ===== */
        .exit-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:var(--r);padding:16px;text-align:center;margin-top:10px}
        .exit-box .exit-time{font-size:28px;font-weight:800;color:#16a34a;font-variant-numeric:tabular-nums}
        .exit-box .exit-label{font-size:12px;color:#166534;margin-top:4px}
        .exit-box.urgent{background:linear-gradient(135deg,#fef2f2,#fecaca);border-color:#f87171}
        .exit-box.urgent .exit-time{color:var(--danger)}
        .exit-box.urgent .exit-label{color:#991b1b}

        /* ===== Nav chooser buttons ===== */
        .nav-opt{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;text-decoration:none;color:var(--txt);transition:.15s}
        .nav-opt:active{background:#f1f5f9;transform:scale(.98)}
        .nav-opt .nav-ico{font-size:28px;width:40px;text-align:center;flex-shrink:0}
        .nav-opt .nav-name{font-size:14px;font-weight:600}
        .nav-opt .nav-desc{font-size:11px;color:var(--txt2)}

        /* ===== Misc ===== */
        .empty{text-align:center;padding:40px 20px;color:var(--txt2)}
        .empty .ico{font-size:48px;opacity:.3;margin-bottom:12px}
        .divider{height:1px;background:var(--border);margin:16px 0}
        .section-title{font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:12px}
        .hidden{display:none!important}
        input[type="file"]{display:none}
    </style>
</head>
<body>

<!-- ===== Header ===== -->
<div class="hdr">
    <h1 id="hdrTitle">泊車記錄</h1>
    <button class="hdr-btn" onclick="showPage('vehicles')">管理車輛</button>
</div>

<!-- ===== Bottom Nav ===== -->
<nav class="bnav">
    <button class="bnav-btn act" onclick="showPage('home')"><span class="ico">🏠</span>首頁</button>
    <button class="bnav-btn" onclick="showPage('history')"><span class="ico">📋</span>記錄</button>
    <button class="bnav-btn" onclick="showPage('reminders')"><span class="ico">🔔</span>提醒</button>
</nav>

<!-- ==================== HOME ==================== -->
<div id="pg-home" class="page active">
    <div id="homeVehicles"></div>
    <div id="noVehicles" class="empty hidden">
        <div class="ico">🚗</div>
        <p>未有車輛資料</p>
        <button class="btn btn-pri" style="margin-top:16px;width:auto;display:inline-flex" onclick="showPage('vehicles')">新增車輛</button>
    </div>
</div>

<!-- ==================== PARKING FLOW ==================== -->
<div id="pg-park" class="page">
    <!-- Step 1: Choose type -->
    <div id="parkStep1">
        <div class="flow-title"><button class="flow-back" onclick="showPage('home')">←</button><span id="parkVehicleName">泊車</span></div>
        <p class="section-title">選擇泊車方式</p>
        <div class="p-type-grid">
            <div class="p-type-card" onclick="selectParkType('own')"><div class="ico">🏠</div><div class="lbl">自己停車場</div><div class="sub">屋苑 / 私人車位</div></div>
            <div class="p-type-card" onclick="selectParkType('free')"><div class="ico">🅿️</div><div class="lbl">不收費位</div><div class="sub">街邊免費位</div></div>
            <div class="p-type-card" onclick="selectParkType('meter')"><div class="ico">⏰</div><div class="lbl">咪錶位</div><div class="sub">需要入標</div></div>
            <div class="p-type-card" onclick="selectParkType('lot')"><div class="ico">🅿️</div><div class="lbl">公共停車場</div><div class="sub">時租 / 日租</div></div>
        </div>
    </div>

    <!-- Step 2: Meter duration (only for meter) -->
    <div id="parkStep2" class="hidden">
        <div class="flow-title"><button class="flow-back" onclick="parkBack(1)">←</button>入錶時間</div>
        <p class="section-title" id="meterDurLabel">選擇入標時間</p>
        <div class="dur-grid" id="meterDurGrid"></div>
        <div class="divider"></div>
        <div class="fg">
            <label>或者自訂入標時間（分鐘）</label>
            <input type="number" id="customMeterMin" placeholder="輸入分鐘數，例如 90" min="1" oninput="onCustomMeter()">
        </div>
        <button class="btn btn-pri" onclick="confirmMeterDur()">確定</button>
    </div>

    <!-- Step 3: Photo + details -->
    <div id="parkStep3" class="hidden">
        <div class="flow-title"><button class="flow-back" onclick="parkBack(2)">←</button>記錄詳情</div>

        <div class="loc-box">
            <div class="st" id="parkLocSt">正在定位...</div>
            <div class="co" id="parkLocCo">—</div>
            <a id="parkLocLink" href="#" target="_blank" style="display:none">在地圖查看</a>
        </div>
        <button class="btn btn-out btn-sm" onclick="getParkLocation()" style="margin-bottom:14px;width:auto">重新定位</button>

        <p class="section-title">影相記錄（可選）</p>
        <div class="photo-box" id="parkPhotoBox" onclick="document.getElementById('parkPhotoInput').click()">
            <div class="ph-ico">📷</div>
            <div class="ph-txt">點擊影相或上傳</div>
        </div>
        <input type="file" id="parkPhotoInput" accept="image/*" capture="environment" onchange="handleParkPhoto(this)">

        <div class="fg">
            <label>位置描述（可選）</label>
            <input type="text" id="parkDesc" placeholder="例如：B2層 A23號位">
        </div>
        <div class="fg">
            <label>備註（可選）</label>
            <textarea id="parkNotes" placeholder="其他資料..."></textarea>
        </div>

        <button class="btn btn-pri" onclick="saveParkRecord()">確認泊車</button>
    </div>
</div>

<!-- ==================== VEHICLES ==================== -->
<div id="pg-vehicles" class="page">
    <div class="flow-title"><button class="flow-back" onclick="showPage('home')">←</button>管理車輛</div>
    <div id="vehicleList"></div>
    <button class="btn btn-out" style="margin-top:12px" onclick="showAddVehicle()">＋ 新增車輛</button>
</div>

<!-- ==================== HISTORY ==================== -->
<div id="pg-history" class="page">
    <p class="section-title">泊車歷史</p>
    <div class="filter-bar" id="histFilter"></div>
    <div id="histList"></div>
</div>

<!-- ==================== REMINDERS ==================== -->
<div id="pg-reminders" class="page">
    <p class="section-title">提醒事項</p>
    <div id="remList"></div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<!-- ===== Modal: Add/Edit Vehicle ===== -->
<div class="modal-bg" id="vehModal">
    <div class="modal">
        <h2 id="vehModalTitle">新增車輛</h2>
        <div class="fg">
            <label>車輛名稱</label>
            <input type="text" id="vehName" placeholder="例如：我架白色 Camry">
        </div>
        <div class="fg">
            <label>車輛類型</label>
            <select id="vehType">
                <option value="car">私家車</option>
                <option value="motorcycle">電單車</option>
            </select>
        </div>
        <div class="fg">
            <label>車牌號碼（可選）</label>
            <input type="text" id="vehPlate" placeholder="例如：AB 1234">
        </div>
        <p class="section-title" style="margin-top:12px">車輛相片（可選）</p>
        <div class="photo-box" id="vehPhotoBox" onclick="document.getElementById('vehPhotoInput').click()" style="min-height:80px">
            <div class="ph-ico">📷</div>
            <div class="ph-txt">影張車相做圖標</div>
        </div>
        <input type="file" id="vehPhotoInput" accept="image/*" capture="environment" onchange="handleVehPhoto(this)">
        <div class="modal-acts">
            <button class="btn btn-out" onclick="closeVehModal()">取消</button>
            <button class="btn btn-pri" onclick="saveVehicle()">儲存</button>
        </div>
    </div>
</div>

<!-- ===== Modal: Delete ===== -->
<div class="modal-bg" id="delModal">
    <div class="modal">
        <h2>確認刪除</h2>
        <p id="delMsg">確定要刪除？</p>
        <div class="modal-acts">
            <button class="btn btn-out" onclick="closeDelModal()">取消</button>
            <button class="btn btn-dn" id="delConfBtn">刪除</button>
        </div>
    </div>
</div>

<!-- ===== Modal: Photo View ===== -->
<div class="modal-bg" id="photoModal" onclick="this.classList.remove('show')">
    <div class="modal" style="padding:8px;max-width:95vw" onclick="event.stopPropagation()">
        <img id="photoModalImg" src="" style="width:100%;border-radius:12px">
    </div>
</div>

<!-- ===== Modal: Navigation Chooser ===== -->
<div class="modal-bg" id="navModal">
    <div class="modal">
        <h2>選擇導航程式</h2>
        <p id="navLocInfo" style="font-size:13px;color:var(--txt2);margin-bottom:14px"></p>
        <div id="navOptions" style="display:flex;flex-direction:column;gap:10px"></div>
        <div class="modal-acts" style="margin-top:14px">
            <button class="btn btn-out" onclick="closeNavModal()">取消</button>
        </div>
    </div>
</div>

<script>
// ================================================================
//  DATA LAYER
// ================================================================
const STORE = {
    get(k, d=[]) { try { return JSON.parse(localStorage.getItem(k)) || d } catch { return d } },
    set(k, v) { localStorage.setItem(k, JSON.stringify(v)) }
};

function getVehicles() { return STORE.get('pk_vehicles', []) }
function setVehicles(v) { STORE.set('pk_vehicles', v) }
function getRecords() { return STORE.get('pk_records', []) }
function setRecords(r) { STORE.set('pk_records', r) }

// ================================================================
//  NAVIGATION
// ================================================================
let currentPage = 'home';
function showPage(id) {
    currentPage = id;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    document.querySelectorAll('.bnav-btn').forEach((b, i) => {
        b.classList.toggle('act', (i === 0 && id === 'home') || (i === 1 && id === 'history') || (i === 2 && id === 'reminders'));
    });
    if (id === 'home') { renderHome(); document.getElementById('hdrTitle').textContent = '泊車記錄'; }
    if (id === 'history') { renderHistory(); document.getElementById('hdrTitle').textContent = '泊車歷史'; }
    if (id === 'reminders') { renderReminders(); document.getElementById('hdrTitle').textContent = '提醒事項'; }
    if (id === 'vehicles') { renderVehicles(); document.getElementById('hdrTitle').textContent = '管理車輛'; }
    if (id === 'park') { document.getElementById('hdrTitle').textContent = '泊車'; }
    window.scrollTo(0, 0);
}

let countdownTimers = [];

function renderHome() {
    countdownTimers.forEach(t => clearInterval(t));
    countdownTimers = [];

    const vehicles = getVehicles();
    const records = getRecords();
    const container = document.getElementById('homeVehicles');
    const noVeh = document.getElementById('noVehicles');

    if (vehicles.length === 0) {
        container.innerHTML = '';
        noVeh.classList.remove('hidden');

    }
    noVeh.classList.add('hidden');

    container.innerHTML = vehicles.map(v => {
        // Find latest active parking for this vehicle
        const active = records.find(r => r.vehicleId === v.id && r.active);
        const avatar = v.photo
            ? `<img class="v-avatar" src="${v.photo}" alt="${esc(v.name)}">`
            : `<div class="v-avatar-placeholder">${v.type === 'car' ? '🚗' : '🏍️'}</div>`;

        const typeLabels = { own: '自己停車場', free: '不收費位', meter: '咪錶位', lot: '公共停車場' };
        const typeIcons = { own: '🏠', free: '🅿️', meter: '⏰', lot: '🅿️' };

        let parkingHtml = '';
        let actionsHtml = '';

        if (active) {
            const t = new Date(active.timestamp);
            const tStr = fmtDateTime(t);
            const locStr = active.locationDesc ? `📍 ${esc(active.locationDesc)}` : (active.location ? '📍 已記錄GPS位置' : '');
            const photoHtml = active.photo ? `<img class="v-parking-photo" src="${active.photo}" alt="泊車相片" onclick="viewPhoto('${active.photo}')">` : '';

            parkingHtml = `
                <div class="v-parking">
                    <div class="v-parking-type">${typeIcons[active.parkType] || ''} ${typeLabels[active.parkType] || active.parkType}</div>
                    <div class="v-parking-time">泊車時間：${tStr}</div>
                    ${locStr ? `<div class="v-parking-loc">${locStr}</div>` : ''}
                    ${photoHtml}
                    <div id="countdown-${active.id}"></div>
                    <div id="exit-${active.id}"></div>
                </div>`;

            let extraBtns = '';
            if (active.parkType === 'lot' && !active.exitStarted) {
                extraBtns = `<button class="btn-paid" onclick="startPaidExit('${active.id}')">已付費離場</button>`;
            }

            actionsHtml = `
                <div class="v-actions">
                    <button class="btn-find" onclick="findMyCar('${active.id}')">搵返架車</button>
                    ${extraBtns}
                    <button class="btn-clear" onclick="clearParking('${active.id}')">取消泊車</button>
                </div>`;
        } else {
            parkingHtml = `<div class="v-parking" style="text-align:center;color:var(--txt2)">未有泊車記錄</div>`;
            actionsHtml = `
                <div class="v-actions">
                    <button class="btn-park" onclick="startParking('${v.id}')">泊車</button>
                </div>`;
        }

        return `
            <div class="card v-status ${v.type === 'motorcycle' ? 'moto' : ''}">
                <div class="v-head">
                    ${avatar}
                    <div class="v-info">
                        <div class="v-name">${esc(v.name)}</div>
                        <div class="v-plate">${v.type === 'car' ? '私家車' : '電單車'}${v.plate ? ' · ' + esc(v.plate) : ''}</div>
                    </div>
                </div>
                ${parkingHtml}
                ${actionsHtml}

    }).join('');

    // Start countdowns for active meter/lot/free/exit
    records.filter(r => r.active).forEach(r => {

        }
        if (r.exitStarted) {

        }
    });
}

// ================================================================
//  METER COUNTDOWN
// ================================================================
function startMeterCountdown(record) {
    const el = document.getElementById('countdown-' + record.id);
    if (!el) return;

    const endTime = new Date(record.meterEndTime).getTime();
    const startTime = new Date(record.timestamp).getTime();
    const totalMs = endTime - startTime;

    function update() {
        const now = Date.now();
        const remaining = endTime - now;
        const pct = Math.max(0, Math.min(100, (remaining / totalMs) * 100));

        let barClass = 'ok';
        if (pct < 15) barClass = 'danger';
        else if (pct < 30) barClass = 'warn';

        if (remaining <= 0) {
            const overMin = Math.floor((now - endTime) / 60000);
            el.innerHTML = `
                <div class="meter-bar" style="margin-top:10px">
                    <div class="meter-countdown" style="color:var(--danger)">已過期 ${overMin} 分鐘</div>
                    <div class="bar-bg"><div class="bar-fill danger" style="width:100%"></div></div>
                    <div class="meter-label">咪錶已夠鐘！</div>
                </div>`;
        } else {
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            const timeStr = h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
            el.innerHTML = `
                <div class="meter-bar" style="margin-top:10px">
                    <div class="meter-countdown">${timeStr}</div>
                    <div class="bar-bg"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
                    <div class="meter-label">剩餘入標時間</div>
                </div>`;
        }
    }
    update();
    countdownTimers.push(setInterval(update, 1000));
}

// ================================================================
//  PAID EXIT COUNTDOWN (停車場已付費)
// ================================================================
function startPaidExit(recordId) {
    const records = getRecords();
    const r = records.find(x => x.id === recordId);
    if (!r) return;
    r.exitStarted = true;
    r.exitStartTime = new Date().toISOString();
    setRecords(records);
    renderHome();
    toast('已開始離場計時（15分鐘）');
}

function renderExitCountdown(record) {
    const el = document.getElementById('exit-' + record.id);
    if (!el) return;

    const startTime = new Date(record.exitStartTime).getTime();
    const endTime = startTime + 15 * 60000; // 15 minutes

    function update() {
        const now = Date.now();
        const remaining = endTime - now;

        if (remaining <= 0) {
            el.innerHTML = `
                <div class="exit-box urgent">
                    <div class="exit-time">已超時！</div>
                    <div class="exit-label">離場時限已過，請盡快離開</div>
                </div>`;
        } else {
            const m = Math.floor(remaining / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            const isUrgent = remaining <= 5 * 60000;
            el.innerHTML = `
                <div class="exit-box ${isUrgent ? 'urgent' : ''}">
                    <div class="exit-time">${m}:${pad(s)}</div>
                    <div class="exit-label">${isUrgent ? '請盡快離場！' : '離場剩餘時間'}</div>
                </div>`;

            // 5-minute warning notification
            if (Math.abs(remaining - 5 * 60000) < 1500) {
                sendNotification('停車場離場提醒', '剩餘5分鐘，請盡快離場！');
            }
        }
    }
    update();
    countdownTimers.push(setInterval(update, 1000));
}

// ================================================================
//  FIND MY CAR — Navigation Chooser
// ================================================================
function findMyCar(recordId) {
    const records = getRecords();
    const r = records.find(x => x.id === recordId);
    if (!r) return;

    const v = getVehicles().find(x => x.id === r.vehicleId);
    const vName = v ? v.name : '你架車';

    // Build location info text
    let locInfo = '';
    if (r.locationDesc) locInfo += `📍 ${r.locationDesc}`;
    if (r.location) {
        if (locInfo) locInfo += '\n';
        locInfo += `GPS: ${r.location.lat.toFixed(6)}, ${r.location.lng.toFixed(6)}`;
    }
    if (r.notes) {
        if (locInfo) locInfo += '\n';
        locInfo += `📝 ${r.notes}`;
    }

    document.getElementById('navLocInfo').textContent = locInfo || '未有位置資料';

    const optContainer = document.getElementById('navOptions');

    if (r.location) {
        const lat = r.location.lat;
        const lng = r.location.lng;

        let options = [];

        // Gaode Maps (高德地圖)
        options.push({
            icon: '🟣',
            name: '高德地圖',
            desc: '用高德地圖導航',
            url: `https://uri.amap.com/navigation?to=${lng},${lat},${encodeURIComponent(r.locationDesc || '泊車位置')}&mode=car&coordinate=wgs84`
        });

        // Google Maps
        options.push({
            icon: '🗺️',
            name: 'Google Maps',
            desc: '用 Google Maps 導航',
            url: `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`
        });

        // Apple Maps
        options.push({
            icon: '🍎',
            name: 'Apple Maps',
            desc: '用 Apple 地圖導航',
            url: `maps://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`
        });

        // Copy coordinates
        options.push({
            icon: '📋',
            name: '複製座標',
            desc: `${lat.toFixed(6)}, ${lng.toFixed(6)}`,
            action: 'copy',
            copyText: `${lat},${lng}`
        });

        optContainer.innerHTML = options.map((o, i) => {
            if (o.action === 'copy') {
                return `<div class="nav-opt" onclick="copyAndClose('${o.copyText}')">
                    <div class="nav-ico">${o.icon}</div>
                    <div><div class="nav-name">${o.name}</div><div class="nav-desc">${o.desc}</div></div>
                </div>`;
            }
            return `<a class="nav-opt" href="${o.url}" target="_blank" rel="noopener" onclick="closeNavModal()">
                <div class="nav-ico">${o.icon}</div>
                <div><div class="nav-name">${o.name}</div><div class="nav-desc">${o.desc}</div></div>
            </a>`;
        }).join('');

    } else if (r.locationDesc) {
        // No GPS, only text — show text info + option to search
        optContainer.innerHTML = `
            <a class="nav-opt" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.locationDesc)}" target="_blank" rel="noopener" onclick="closeNavModal()">
                <div class="nav-ico">🗺️</div>
                <div><div class="nav-name">Google Maps 搜索</div><div class="nav-desc">搜索「${esc(r.locationDesc)}」</div></div>
            </a>
            <div class="nav-opt" onclick="copyAndClose('${esc(r.locationDesc)}')">
                <div class="nav-ico">📋</div>
                <div><div class="nav-name">複製位置描述</div><div class="nav-desc">${esc(r.locationDesc)}</div></div>
            </div>`;
    } else {
        optContainer.innerHTML = '<p style="text-align:center;color:var(--txt2);padding:20px">呢條記錄冇定位或位置資料</p>';
    }

    document.getElementById('navModal').classList.add('show');
}

function closeNavModal() {
    document.getElementById('navModal').classList.remove('show');
}

function copyAndClose(text) {
    navigator.clipboard.writeText(text).then(() => {
        toast('已複製到剪貼簿');
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('已複製到剪貼簿');
    });
    closeNavModal();
}

// ================================================================
let parkState = {
    vehicleId: null,
    vehicleType: null,
    parkType: null,
    meterMinutes: null,
    location: null,
    photo: null
};

function startParking(vehicleId) {
    const vehicles = getVehicles();
    const v = vehicles.find(x => x.id === vehicleId);
    if (!v) return;

    parkState = { vehicleId: v.id, vehicleType: v.type, parkType: null, meterMinutes: null, location: null, photo: null };
    document.getElementById('parkVehicleName').textContent = `${v.name} — 泊車`;

    // Reset steps
    document.getElementById('parkStep1').classList.remove('hidden');
    document.getElementById('parkStep2').classList.add('hidden');
    document.getElementById('parkStep3').classList.add('hidden');
    document.querySelectorAll('#parkStep1 .p-type-card').forEach(c => c.classList.remove('sel'));

    showPage('park');
}

function selectParkType(type) {
    parkState.parkType = type;

    if (type === 'own') {
        // Own parking — auto-fill default location and save directly
        showDetailsStep();
        document.getElementById('parkDesc').value = '雲景台負二層31號車位';
    } else if (type === 'meter') {
        // Show meter duration step
        showMeterStep();
    } else {
        // Skip to details
        showDetailsStep();
    }
}

function showMeterStep() {
    document.getElementById('parkStep1').classList.add('hidden');
    document.getElementById('parkStep2').classList.remove('hidden');
    document.getElementById('parkStep3').classList.add('hidden');

    const grid = document.getElementById('meterDurGrid');
    const isCar = parkState.vehicleType === 'car';

    if (isCar) {
        document.getElementById('meterDurLabel').textContent = '私家車 — 選擇入標時間';
        grid.innerHTML = `
            <div class="dur-btn" onclick="selectMeterDur(this, 60)"><span class="big">1</span>小時</div>
            <div class="dur-btn" onclick="selectMeterDur(this, 120)"><span class="big">2</span>小時</div>
            <div class="dur-btn" onclick="selectMeterDur(this, 240)"><span class="big">4</span>小時</div>`;
    } else {
        document.getElementById('meterDurLabel').textContent = '電單車 — 選擇入標時間';
        grid.innerHTML = `
            <div class="dur-btn" onclick="selectMeterDur(this, 120)"><span class="big">2</span>小時</div>
            <div class="dur-btn" onclick="selectMeterDur(this, 240)"><span class="big">4</span>小時</div>`;
    }

    document.getElementById('customMeterMin').value = '';
}

function selectMeterDur(el, min) {
    document.querySelectorAll('#parkStep2 .dur-btn').forEach(b => b.classList.remove('sel'));
    el.classList.add('sel');
    parkState.meterMinutes = min;
    document.getElementById('customMeterMin').value = '';
}

function onCustomMeter() {
    const val = parseInt(document.getElementById('customMeterMin').value);
    if (val > 0) {
        parkState.meterMinutes = val;
        document.querySelectorAll('#parkStep2 .dur-btn').forEach(b => b.classList.remove('sel'));
    }
}

function confirmMeterDur() {
    if (!parkState.meterMinutes || parkState.meterMinutes <= 0) {
        toast('請選擇或輸入入標時間');
        return;
    }
    showDetailsStep();
}

function showDetailsStep() {
    document.getElementById('parkStep1').classList.add('hidden');
    document.getElementById('parkStep2').classList.add('hidden');
    document.getElementById('parkStep3').classList.remove('hidden');

    // Reset
    parkState.photo = null;
    parkState.location = null;
    const box = document.getElementById('parkPhotoBox');
    box.classList.remove('has');
    box.innerHTML = '<div class="ph-ico">📷</div><div class="ph-txt">點擊影相或上傳</div>';
    document.getElementById('parkDesc').value = '';
    document.getElementById('parkNotes').value = '';

    getParkLocation();
}

function parkBack(step) {
    if (step === 1) {
        showPage('home');
    } else if (step === 2) {
        if (parkState.parkType === 'meter') {
            document.getElementById('parkStep1').classList.remove('hidden');
            document.getElementById('parkStep2').classList.add('hidden');
            document.getElementById('parkStep3').classList.add('hidden');
        } else {
            document.getElementById('parkStep1').classList.remove('hidden');
            document.getElementById('parkStep2').classList.add('hidden');
            document.getElementById('parkStep3').classList.add('hidden');
        }
    }
}

// Park location
function getParkLocation() {
    const st = document.getElementById('parkLocSt');
    const co = document.getElementById('parkLocCo');
    const link = document.getElementById('parkLocLink');
    st.textContent = '正在定位...';
    co.textContent = '—';
    link.style.display = 'none';

    if (!navigator.geolocation) { st.textContent = '裝置唔支援定位'; return; }

    navigator.geolocation.getCurrentPosition(pos => {
        parkState.location = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
        st.textContent = '已定位 ✓';
        co.textContent = `${parkState.location.lat.toFixed(6)}, ${parkState.location.lng.toFixed(6)}`;
        link.href = `https://maps.google.com/?q=${parkState.location.lat},${parkState.location.lng}`;
        link.style.display = 'inline';
    }, err => {
        st.textContent = '無法定位';
        co.textContent = err.code === 1 ? '請允許定位權限' : '定位失敗，請重試';
    }, { enableHighAccuracy: true, timeout: 10000 });
}

// Park photo
function handleParkPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        parkState.photo = e.target.result;
        const box = document.getElementById('parkPhotoBox');
        box.classList.add('has');
        box.innerHTML = `<img src="${parkState.photo}" alt="泊車相片">`;
    };
    reader.readAsDataURL(file);
}

// Save parking record
function saveParkRecord() {
    const now = new Date();
    const record = {
        id: Date.now().toString(),
        vehicleId: parkState.vehicleId,
        parkType: parkState.parkType,
        meterMinutes: parkState.meterMinutes,
        meterEndTime: parkState.parkType === 'meter' && parkState.meterMinutes
            ? new Date(now.getTime() + parkState.meterMinutes * 60000).toISOString()
            : null,
        location: parkState.location,
        locationDesc: document.getElementById('parkDesc').value.trim(),
        notes: document.getElementById('parkNotes').value.trim(),
        photo: parkState.photo,
        timestamp: now.toISOString(),
        active: true,
        exitStarted: false,
        exitStartTime: null
    };

    const records = getRecords();
    // Deactivate previous active for same vehicle
    records.forEach(r => { if (r.vehicleId === parkState.vehicleId) r.active = false; });
    records.unshift(record);
    setRecords(records);

    // Schedule reminders
    scheduleReminders(record);

    toast('泊車記錄已儲存！');
    showPage('home');
}

// ================================================================
//  REMINDER SYSTEM
// ================================================================
let reminderTimers = [];

function clearAllReminders() {
    reminderTimers.forEach(t => clearTimeout(t));
    reminderTimers = [];
}

function scheduleReminders(record) {
    const v = getVehicles().find(x => x.id === record.vehicleId);
    const vName = v ? v.name : '你架車';

    if (record.parkType === 'free') {
        // Free street: remind every 24 hours
        scheduleFreeReminders(record, vName);
    } else if (record.parkType === 'meter' && record.meterEndTime) {
        // Meter: 15min before, at expiry, then every 1hr after
        scheduleMeterReminders(record, vName);
    } else if (record.parkType === 'lot') {
        // Public parking: every 4 hours
        scheduleLotReminders(record, vName);
    }
}

function scheduleFreeReminders(record, vName) {
    const interval = 24 * 60 * 60000; // 24 hours
    function loop() {
        const r = getRecords().find(x => x.id === record.id);
        if (!r || !r.active) return;
        sendNotification(`${vName} 不收費位提醒`, '你嘅車已泊咗超過24小時，記得留意下');
        reminderTimers.push(setTimeout(loop, interval));
    }
    reminderTimers.push(setTimeout(loop, interval));
}

function scheduleMeterReminders(record, vName) {
    const endTime = new Date(record.meterEndTime).getTime();
    const now = Date.now();

    // 15 min before
    const warn15 = endTime - 15 * 60000 - now;
    if (warn15 > 0) {
        reminderTimers.push(setTimeout(() => {
            const r = getRecords().find(x => x.id === record.id);
            if (!r || !r.active) return;
            sendNotification(`${vName} 咪錶提醒`, '仲有15分鐘就夠鐘，記得入標！');
        }, warn15));
    }

    // At expiry
    const warnExpiry = endTime - now;
    if (warnExpiry > 0) {
        reminderTimers.push(setTimeout(() => {
            const r = getRecords().find(x => x.id === record.id);
            if (!r || !r.active) return;
            sendNotification(`${vName} 咪錶已夠鐘！`, '咪錶時間已到，請盡快處理！');
            // Then every 1 hour after
            function hourLoop() {
                const r2 = getRecords().find(x => x.id === record.id);
                if (!r2 || !r2.active) return;
                sendNotification(`${vName} 咪錶已夠鐘！`, '咪錶已過期，請盡快處理！');
                reminderTimers.push(setTimeout(hourLoop, 60 * 60000));
            }
            reminderTimers.push(setTimeout(hourLoop, 60 * 60000));
        }, warnExpiry));
    }
}

function scheduleLotReminders(record, vName) {
    const interval = 4 * 60 * 60000; // 4 hours
    function loop() {
        const r = getRecords().find(x => x.id === record.id);
        if (!r || !r.active) return;
        sendNotification(`${vName} 停車場提醒`, '你嘅車已泊咗一段時間，記得留意');
        reminderTimers.push(setTimeout(loop, interval));
    }
    reminderTimers.push(setTimeout(loop, interval));
}

function sendNotification(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, tag: 'pk-' + Date.now() });
    }
}

function renderVehicles() {

        const av = v.photo
            ? `<img class="av" src="${v.photo}" alt="${esc(v.name)}" onclick="document.getElementById('vehPhotoInput_${v.id}').click()">`
            : `<div class="av-ph" onclick="document.getElementById('vehPhotoInput_${v.id}').click()">${v.type === 'car' ? '🚗' : '🏍️'}</div>`;
        return `
            <div class="vm-card">
                ${av}
                <div class="vm-info">
                    <div class="vm-name">${esc(v.name)}</div>
                    <div class="vm-type">${v.type === 'car' ? '私家車' : '電單車'}</div>
                    ${v.plate ? `<div class="vm-plate">${esc(v.plate)}</div>` : ''}
                </div>
                <button class="vm-edit" onclick="editVehicle('${v.id}')">編輯</button>
                <button class="vm-edit" style="color:var(--danger);border-color:#fecaca;margin-left:4px" onclick="deleteVehicle('${v.id}')">刪除</button>
            </div>`;
    }).join('');
}

function showAddVehicle() {
    editingVehicleId = null;
    vehPhotoData = null;
    document.getElementById('vehModalTitle').textContent = '新增車輛';
    document.getElementById('vehName').value = '';
    document.getElementById('vehType').value = 'car';
    document.getElementById('vehPlate').value = '';
    const box = document.getElementById('vehPhotoBox');
    box.classList.remove('has');
    box.innerHTML = '<div class="ph-ico">📷</div><div class="ph-txt">影張車相做圖標</div>';
    document.getElementById('vehModal').classList.add('show');
}

function editVehicle(id) {
    const vehicles = getVehicles();
    const v = vehicles.find(x => x.id === id);
    if (!v) return;

    editingVehicleId = id;
    vehPhotoData = v.photo || null;
    document.getElementById('vehModalTitle').textContent = '編輯車輛';
    document.getElementById('vehName').value = v.name;
    document.getElementById('vehType').value = v.type;
    document.getElementById('vehPlate').value = v.plate || '';

    const box = document.getElementById('vehPhotoBox');
    if (v.photo) {
        box.classList.add('has');
        box.innerHTML = `<img src="${v.photo}" alt="車輛相片">`;
    } else {
        box.classList.remove('has');
        box.innerHTML = '<div class="ph-ico">📷</div><div class="ph-txt">影張車相做圖標</div>';
    }
    document.getElementById('vehModal').classList.add('show');
}

function handleVehPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        vehPhotoData = e.target.result;
        const box = document.getElementById('vehPhotoBox');
        box.classList.add('has');
        box.innerHTML = `<img src="${vehPhotoData}" alt="車輛相片">`;
    };
    reader.readAsDataURL(file);
}

function saveVehicle() {
    const name = document.getElementById('vehName').value.trim();
    const type = document.getElementById('vehType').value;
    const plate = document.getElementById('vehPlate').value.trim();

    if (!name) { toast('請輸入車輛名稱'); return; }

    const vehicles = getVehicles();

    if (editingVehicleId) {
        const v = vehicles.find(x => x.id === editingVehicleId);
        if (v) {
            v.name = name;
            v.type = type;
            v.plate = plate;
            v.photo = vehPhotoData;
        }
    } else {
        vehicles.push({
            id: Date.now().toString(),
            name,
            type,
            plate,
            photo: vehPhotoData
        });
    }

    setVehicles(vehicles);
    closeVehModal();
    renderVehicles();
    toast(editingVehicleId ? '車輛已更新' : '車輛已新增');
}

function deleteVehicle(id) {
    document.getElementById('delMsg').textContent = '確定要刪除呢架車？相關泊車記錄唔會刪除。';
    document.getElementById('delModal').classList.add('show');
    document.getElementById('delConfBtn').onclick = () => {
        let vehicles = getVehicles();
        vehicles = vehicles.filter(v => v.id !== id);
        setVehicles(vehicles);
        closeDelModal();
        renderVehicles();
        toast('車輛已刪除');
    };
}

function closeVehModal() {
    document.getElementById('vehModal').classList.remove('show');
}

// ================================================================
//  HISTORY
// ================================================================
let histFilter = 'all';

function renderHistory() {
    const vehicles = getVehicles();
    const records = getRecords();

    // Filter bar
    const filterBar = document.getElementById('histFilter');
    filterBar.innerHTML = `
        <div class="fchip ${histFilter === 'all' ? 'act' : ''}" onclick="setHistFilter('all')">全部</div>
        ${vehicles.map(v => `<div class="fchip ${histFilter === v.id ? 'act' : ''}" onclick="setHistFilter('${v.id}')">${v.type === 'car' ? '🚗' : '🏍️'} ${esc(v.name)}</div>`).join('')}
    `;

    let filtered = records;
    if (histFilter !== 'all') {
        filtered = records.filter(r => r.vehicleId === histFilter);
    }

    const list = document.getElementById('histList');
    if (filtered.length === 0) {
        list.innerHTML = '<div class="empty"><div class="ico">📋</div><p>暫時冇記錄</p></div>';
        return;
    }

    const typeLabels = { own: '自己停車場', free: '不收費位', meter: '咪錶位', lot: '公共停車場' };

    list.innerHTML = filtered.map(r => {
        const v = vehicles.find(x => x.id === r.vehicleId);
        const vName = v ? v.name : '未知車輛';
        const vType = v ? v.type : 'car';
        const t = fmtDateTime(new Date(r.timestamp));

        const typeClass = r.parkType || 'own';
        const photoHtml = r.photo ? `<img class="rec-photo" src="${r.photo}" onclick="viewPhoto('${r.photo.substring(0, 50)}')">` : '';
        const locHtml = r.locationDesc ? `<div class="rec-loc">📍 ${esc(r.locationDesc)}</div>` : '';
        const notesHtml = r.notes ? `<div class="rec-notes">${esc(r.notes)}</div>` : '';
        const meterInfo = r.parkType === 'meter' && r.meterMinutes
            ? `<div style="font-size:12px;color:var(--warn);margin-bottom:6px">⏰ 入標 ${r.meterMinutes} 分鐘</div>`
            : '';
        const activeTag = r.active ? '<span style="font-size:11px;color:var(--ok);font-weight:600;margin-left:6px">● 進行中</span>' : '';

        return `
            <div class="rec-card ${vType === 'motorcycle' ? 'moto' : ''}">
                <div class="rec-head">
                    <div>
                        <span class="vtag ${vType === 'car' ? 'car' : 'moto'}">${vType === 'car' ? '🚗' : '🏍️'} ${esc(vName)}</span>
                        <span class="ptag ${typeClass}">${typeLabels[r.parkType] || r.parkType}</span>
                        ${activeTag}
                    </div>
                    <span class="rec-time">${t}</span>
                </div>
                ${meterInfo}
                ${locHtml}
                ${photoHtml}
                ${notesHtml}
                <div class="rec-acts">
                    <button onclick="findMyCar('${r.id}')">🧭 導航</button>
                    <button class="del" onclick="deleteRecord('${r.id}')">🗑️ 刪除</button>
                </div>
            </div>`;
    }).join('');
}

function setHistFilter(f) {
    histFilter = f;
    renderHistory();
}

function deleteRecord(recordId) {
    document.getElementById('delMsg').textContent = '確定要刪除呢條泊車記錄？';
    document.getElementById('delModal').classList.add('show');
    document.getElementById('delConfBtn').onclick = () => {
        let records = getRecords();
        records = records.filter(r => r.id !== recordId);
        setRecords(records);
        closeDelModal();
        renderHistory();
        toast('記錄已刪除');
    };
}

// ================================================================
//  REMINDERS PAGE
// ================================================================
function renderReminders() {
    const vehicles = getVehicles();
    const records = getRecords();
    const container = document.getElementById('remList');
    const now = new Date();

    const activeRecords = records.filter(r => r.active);
    if (activeRecords.length === 0) {
        container.innerHTML = '<div class="empty"><div class="ico">🔔</div><p>暫時冇提醒</p></div>';
        return;
    }

    const typeLabels = { own: '自己停車場', free: '不收費位', meter: '咪錶位', lot: '公共停車場' };

    container.innerHTML = activeRecords.map(r => {
        const v = vehicles.find(x => x.id === r.vehicleId);
        const vName = v ? v.name : '未知車輛';
        let statusHtml = '';

        if (r.parkType === 'meter' && r.meterEndTime) {
            const end = new Date(r.meterEndTime);
            const remaining = end.getTime() - now.getTime();
            const isOverdue = remaining <= 0;
            const overMin = isOverdue ? Math.floor(-remaining / 60000) : 0;

            if (isOverdue) {
                statusHtml = `<div class="rem-time">已過期 ${overMin} 分鐘！</div>`;
            } else {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                statusHtml = `<div class="rem-time">剩餘 ${h > 0 ? h + '小時' : ''}${m}分鐘</div>`;
            }

            return `
                <div class="rem-card ${isOverdue ? 'overdue' : ''}">
                    <h4>⏰ ${esc(vName)} — 咪錶位</h4>
                    <p>入標 ${r.meterMinutes} 分鐘 · 到期時間：${fmtTime(end)}</p>
                    ${statusHtml}
                    <p style="margin-top:6px;font-size:11px;color:var(--txt2)">提醒：到期前15分鐘、到期時、之後每1小時</p>
                </div>`;
        } else if (r.parkType === 'free') {
            const elapsed = now.getTime() - new Date(r.timestamp).getTime();
            const hrs = Math.floor(elapsed / 3600000);
            return `
                <div class="rem-card">
                    <h4>🅿️ ${esc(vName)} — 不收費位</h4>
                    <p>已泊 ${hrs} 小時</p>
                    <p style="margin-top:6px;font-size:11px;color:var(--txt2)">提醒：每24小時提醒一次</p>
                </div>`;
        } else if (r.parkType === 'lot') {
            const elapsed = now.getTime() - new Date(r.timestamp).getTime();
            const hrs = Math.floor(elapsed / 3600000);
            let exitHtml = '';
            if (r.exitStarted) {
                const exitEnd = new Date(r.exitStartTime).getTime() + 15 * 60000;
                const exitRemaining = exitEnd - now.getTime();
                if (exitRemaining <= 0) {
                    exitHtml = `<div class="rem-time" style="color:var(--danger)">離場時限已過！</div>`;
                } else {
                    const m = Math.floor(exitRemaining / 60000);
                    const s = Math.floor((exitRemaining % 60000) / 1000);
                    exitHtml = `<div class="rem-time" style="color:var(--ok)">離場剩餘 ${m}:${pad(s)}</div>`;
                }
            }
            return `
                <div class="rem-card">
                    <h4>🅿️ ${esc(vName)} — 公共停車場</h4>
                    <p>已泊 ${hrs} 小時</p>
                    ${exitHtml}
                    <p style="margin-top:6px;font-size:11px;color:var(--txt2)">提醒：每4小時提醒一次</p>
                </div>`;
        } else {
            return `
                <div class="rem-card">
                    <h4>🏠 ${esc(vName)} — ${typeLabels[r.parkType] || r.parkType}</h4>
                    <p>泊車時間：${fmtDateTime(new Date(r.timestamp))}</p>
                </div>`;
        }
    }).join('');
}

// ================================================================
//  PHOTO VIEW
// ================================================================
function viewPhoto(src) {
    // Find full src from records
    const records = getRecords();
    for (const r of records) {
        if (r.photo && r.photo.startsWith(src)) {
            document.getElementById('photoModalImg').src = r.photo;
            document.getElementById('photoModal').classList.add('show');
            return;
        }
    }
    // Also check if src is full already
    document.getElementById('photoModalImg').src = src;
    document.getElementById('photoModal').classList.add('show');
}

// ================================================================
//  HELPERS
// ================================================================
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function pad(n) { return n.toString().padStart(2, '0'); }
function fmtDateTime(d) { return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

// ================================================================
//  INIT
// ================================================================
(function init() {
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => {
            console.log('Service Worker registered');
        }).catch(err => {
            console.log('SW registration failed:', err);
        });
    }

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    // Re-schedule reminders for active records
    const records = getRecords();
    records.filter(r => r.active).forEach(r => scheduleReminders(r));

    // Render home
    renderHome();

    // Auto refresh home every 30 seconds for countdowns
    setInterval(() => {
        if (currentPage === 'home') renderHome();
        if (currentPage === 'reminders') renderReminders();
    }, 30000);
})();
</script>
