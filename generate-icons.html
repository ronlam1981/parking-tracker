<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body>
<h2>生成 App 圖標</h2>
<p>右鍵圖片 → 另存為對應檔名</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br><br>
<a id="dl192" download="icon-192.png">下載 icon-192.png</a> |
<a id="dl512" download="icon-512.png">下載 icon-512.png</a>

<script>
function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    const r = size * 0.15;

    // Background
    ctx.fillStyle = '#2563eb';
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();

    // "P" letter
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${size * 0.55}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('P', size * 0.5, size * 0.42);

    // Location pin icon (small)
    ctx.font = `${size * 0.18}px sans-serif`;
    ctx.fillText('📍', size * 0.5, size * 0.78);
}

['192', '512'].forEach(s => {
    const size = parseInt(s);
    const canvas = document.getElementById('c' + s);
    drawIcon(canvas, size);
    document.getElementById('dl' + s).href = canvas.toDataURL('image/png');
});
</script>
</body>
</html>
